<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hello PWA</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#2196f3">

    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            font-size: 20px;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 10px;
        }

        .word {
            background: white;
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            font-size: 20px;
        }
    </style>
</head>

<body>


<h1>単語帳</h1>


<input id="word"
placeholder="英単語">


<input id="meaning"
placeholder="日本語の意味">


<button onclick="addWord()">
保存
</button>


<div id="list"></div>



<script>


let words =
JSON.parse(localStorage.getItem("words"))
|| [];



function addWord(){

    let word =
    document.getElementById("word").value;


    let meaning =
    document.getElementById("meaning").value;


    if(word==="" || meaning===""){
        return;
    }


    words.push({
        word:word,
        meaning:meaning
    });


    localStorage.setItem(
        "words",
        JSON.stringify(words)
    );


    document.getElementById("word").value="";
    document.getElementById("meaning").value="";


    showWords();

}



function showWords(){

    let html="";


    words.forEach(function(item){

        html += `
        <div class="word">
        ${item.word}<br>
        ↓<br>
        ${item.meaning}
        </div>
        `;

    });


    document.getElementById("list")
    .innerHTML=html;

}



showWords();



if ('serviceWorker' in navigator){

navigator.serviceWorker.register(
'service-worker.js'
);

}


</script>


</body>

</html>
